<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国际贸易链式解析工具 - 专业版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        consulting: {
                            blue: '#1E3A8A',
                            purple: '#4C1D95',
                            light: '#F3F4F6',
                            warning: '#FEF3C7',
                            warningText: '#92400E',
                            success: '#ECFDF5',
                            successText: '#065F46'
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <div id="app" class="max-w-5xl mx-auto p-4 md:p-8">
        
        <header class="mb-8 border-b-2 border-consulting-blue pb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-consulting-blue tracking-tight">国际贸易链式与Flow解析工具</h1>
                <p class="text-sm text-gray-500 mt-1">基于 ICC Incoterms® 2020 | 专注海关估价与供应链合规</p>
            </div>
            <button @click="exportPDF" class="bg-consulting-purple hover:bg-purple-800 text-white text-sm py-2 px-6 rounded shadow transition shrink-0">
                导出报告 (PDF)
            </button>
        </header>

        <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 mb-8 pdf-no-break">
            <h2 class="text-lg font-semibold text-consulting-blue mb-4 flex items-center">
                <span class="w-1 h-5 bg-consulting-purple inline-block mr-2"></span>
                推演场景设定
            </h2>
            
            <div class="space-y-4">
                <div v-for="(leg, index) in tradeLegs" :key="index" class="flex flex-col flex-wrap lg:flex-row items-start lg:items-center gap-3 p-4 bg-gray-50 rounded border border-gray-200 relative">
                    
                    <div class="flex items-center gap-2 w-full lg:w-auto">
                        <span class="text-sm font-bold text-gray-400">段 {{ index + 1 }}</span>
                        <input v-model="leg.seller" placeholder="卖方" class="border rounded px-2 py-1.5 w-full text-center text-sm focus:outline-consulting-blue lg:w-32">
                        <span class="text-gray-400">→</span>
                        <input v-model="leg.buyer" placeholder="买方" class="border rounded px-2 py-1.5 w-full text-center text-sm focus:outline-consulting-blue lg:w-32">
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                        <select v-model="leg.term" class="border rounded px-3 py-1.5 bg-white font-bold text-consulting-purple text-sm focus:outline-consulting-blue w-full lg:w-auto">
                            <option v-for="(data, term) in incotermsData" :value="term">{{ term }}</option>
                        </select>
